<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>wiki-character-power-index</title>
    <link rel="stylesheet" href="./styles.css">
    <script defer src="./app.js"></script>
  </head>
  <body>
    <main class="app-shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">Wikipedia-only evidence</p>
          <h1>Character Power Index</h1>
        </div>
        <a class="source-link" href="https://github.com/jim-auto/wiki-character-power-ranking">GitHub</a>
      </header>

      <section class="workspace">
        <div class="mode-tabs" role="tablist" aria-label="Ranking mode">
          <button class="tab-button is-active" type="button" data-view="power">Power</button>
          <button class="tab-button" type="button" data-view="iq">IQ</button>
          <button class="tab-button" type="button" data-view="battle">Battle</button>
        </div>

        <section class="controls" aria-label="Filters">
          <label class="search-field">
            <span>Search</span>
            <input id="search-filter" type="search" placeholder="Name, universe, media">
          </label>
          <label>
            <span>Media</span>
            <select id="media-filter">
              <option value="all">All</option>
              <option value="manga">Manga</option>
              <option value="anime">Anime</option>
              <option value="movie">Movie</option>
              <option value="comic">Comic</option>
            </select>
          </label>
          <label>
            <span>Universe</span>
            <select id="universe-filter">
              <option value="all">All</option>
            </select>
          </label>
          <label>
            <span>Min</span>
            <input id="min-score" type="number" min="0" max="60" inputmode="numeric">
          </label>
          <label>
            <span>Max</span>
            <input id="max-score" type="number" min="0" max="60" inputmode="numeric">
          </label>
          <fieldset class="condition-controls" aria-label="Condition filters">
            <legend>Conditions</legend>
            <div id="condition-options" class="condition-options"></div>
          </fieldset>
        </section>

        <section id="ranking-view" class="view-panel">
          <div class="section-heading">
            <h2 id="ranking-title">Power Ranking</h2>
            <span id="result-count" class="count-badge">0</span>
          </div>
          <div id="ranking-list" class="ranking-list" aria-live="polite"></div>
        </section>

        <section id="battle-view" class="view-panel is-hidden">
          <div class="section-heading">
            <h2>Battle Mode</h2>
          </div>
          <div class="battle-controls">
            <label>
              <span>A</span>
              <select id="battle-a"></select>
            </label>
            <label>
              <span>B</span>
              <select id="battle-b"></select>
            </label>
            <label>
              <span>Mode</span>
              <select id="battle-mode">
                <option value="power">Power</option>
                <option value="iq">IQ</option>
                <option value="balanced">Balanced</option>
              </select>
            </label>
          </div>
          <div id="battle-result" class="battle-result" aria-live="polite"></div>
        </section>
      </section>
    </main>
  </body>
</html>
